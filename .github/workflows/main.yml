name: Build & Release rmenu

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Manual trigger

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build static binaries
        run: |
          rustup target add x86_64-unknown-linux-gnu x86_64-apple-darwin x86_64-pc-windows-gnu
          cargo build --release --target x86_64-unknown-linux-gnu
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target x86_64-pc-windows-gnu

      - name: Make Linux binary executable
        run: chmod +x target/x86_64-unknown-linux-gnu/release/rmenu

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/x86_64-unknown-linux-gnu/release/rmenu
            target/x86_64-apple-darwin/release/rmenu
            target/x86_64-pc-windows-gnu/release/rmenu.exe
