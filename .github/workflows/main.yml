name: CI/CD - Build & Release rmenu

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  push:
    tags: [ '*' ]  # Triggers on any tag push (e.g., v1.0.0)

permissions:
  contents: write

jobs:
  # Linux static binary
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install musl tools
        run: |
          rustup target add x86_64-unknown-linux-musl
          sudo apt update -y
          sudo apt install -y musl-tools
      
      - name: Build static Linux
        run: cargo build --release --target x86_64-unknown-linux-musl
      
      - name: Make executable
        run: chmod +x target/x86_64-unknown-linux-musl/release/rmenu
      
      - uses: actions/upload-artifact@v4
        with:
          name: rmenu-linux
          path: target/x86_64-unknown-linux-musl/release/rmenu

  # Windows binary  
  windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install mingw
        run: |
          rustup target add x86_64-pc-windows-gnu
          sudo apt update -y
          sudo apt install -y gcc-mingw-w64-x86-64
      
      - name: Build Windows
        run: cargo build --release --target x86_64-pc-windows-gnu
      
      - uses: actions/upload-artifact@v4
        with:
          name: rmenu-windows
          path: target/x86_64-pc-windows-gnu/release/rmenu.exe

  # macOS binary
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust + macOS target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      
      - name: Build macOS
        run: cargo build --release --target x86_64-apple-darwin
      
      - name: Make executable
        run: chmod +x target/x86_64-apple-darwin/release/rmenu
      
      - uses: actions/upload-artifact@v4
        with:
          name: rmenu-macos
          path: target/x86_64-apple-darwin/release/rmenu

  # GitHub Release (tags only)
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Rename artifacts for release
        run: |
          mv artifacts/rmenu-linux/rmenu rmenu-linux
          mv artifacts/rmenu-windows/rmenu.exe rmenu-windows.exe
          mv artifacts/rmenu-macos/rmenu rmenu-macos
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            rmenu-linux
            rmenu-windows.exe
            rmenu-macos
