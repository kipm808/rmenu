name: Build & Release rmenu (Linux/macOS/Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

# Linux static binary
jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cross tools
        run: |
          rustup target add x86_64-unknown-linux-musl
          sudo apt update
          sudo apt install -y musl-tools gcc make
      
      - name: Build static Linux
        run: cargo build --release --target x86_64-unknown-linux-musl
      
      - name: Make executable
        run: chmod +x target/x86_64-unknown-linux-musl/release/rmenu
      
      - uses: actions/upload-artifact@v4
        with:
          name: rmenu-linux
          path: target/x86_64-unknown-linux-musl/release/rmenu

  # Windows binary  
  windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install mingw
        run: |
          rustup target add x86_64-pc-windows-gnu
          sudo apt update
          sudo apt install -y gcc-mingw-w64-x86-64
      
      - name: Build Windows
        run: cargo build --release --target x86_64-pc-windows-gnu
      
      - uses: actions/upload-artifact@v4
        with:
          name: rmenu-windows
          path: target/x86_64-pc-windows-gnu/release/rmenu.exe

  # macOS binary
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build macOS
        run: cargo build --release --target x86_64-apple-darwin
      
      - name: Make executable
        run: chmod +x target/x86_64-apple-darwin/release/rmenu
      
      - uses: actions/upload-artifact@v4
        with:
          name: rmenu-macos
          path: target/x86_64-apple-darwin/release/rmenu

  # Create GitHub Release
  release:
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            rmenu-linux/rmenu
            rmenu-windows/rmenu.exe
            rmenu-macos/rmenu
